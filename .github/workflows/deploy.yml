# =====================================================
# PIPELINE CI/CD - Frontend Flask
# Trigger: Push a rama 'deploy'
# Flujo: Build → Push a Docker Hub → Deploy en EC2
# =====================================================

name: CI/CD Frontend - Build, Push & Deploy

on:
  push:
    branches:
      - deploy

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_HUB_USERNAME }}/frontend-flask
  EC2_HOST: ${{ secrets.EC2_FRONTEND_HOST }}

jobs:
  # ---- Job 1: Build y Push de la imagen Docker ----
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      # Paso 1: Clonar el repositorio
      - name: Checkout del código
        uses: actions/checkout@v4

      # Paso 2: Iniciar sesión en Docker Hub
      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # Paso 3: Configurar Docker Buildx para builds optimizados
      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Paso 4: Construir y publicar la imagen Docker
      - name: Build y Push de la imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---- Job 2: Deploy en instancia EC2 ----
  deploy:
    name: Deploy en EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      # Paso 1: Deploy via SSH en la instancia EC2
      - name: Deploy en EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_FRONTEND_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "=== Iniciando deploy del Frontend ==="
            
            # Hacer pull de la imagen más reciente
            docker pull ${{ env.DOCKER_IMAGE }}:latest
            
            # Detener y eliminar contenedor anterior si existe
            docker stop frontend-flask 2>/dev/null || true
            docker rm frontend-flask 2>/dev/null || true
            
            # Ejecutar nuevo contenedor
            docker run -d \
              --name frontend-flask \
              --restart unless-stopped \
              --network host \
              -e PORT=5000 \
              -e DEBUG=False \
              -e BACKEND_URL=${{ secrets.BACKEND_URL }} \
              -e SECRET_KEY=${{ secrets.SECRET_KEY }} \
              ${{ env.DOCKER_IMAGE }}:latest
            
            # Limpiar imágenes antiguas no utilizadas
            docker image prune -f
            
            echo "=== Deploy del Frontend completado ==="
