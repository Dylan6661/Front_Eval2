# =====================================================
# DOCKER COMPOSE - Frontend Flask
# Proyecto: Sistema de Gestión de Usuarios - Innovatech Chile
# =====================================================

version: '3.8'

services:
  # Servicio Frontend - Aplicación Web Flask
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: frontend-flask
    image: frontend-flask:latest
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DEBUG=False
      - BACKEND_URL=${BACKEND_URL:-http://backend:3000}
      - SECRET_KEY=${SECRET_KEY:-clave_secreta_produccion}
    restart: unless-stopped
    networks:
      - frontend-network
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  frontend-network:
    driver: bridge
